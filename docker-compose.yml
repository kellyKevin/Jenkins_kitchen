version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=jeniks_db
      - POSTGRES_USER=jeniks_user
      - POSTGRES_PASSWORD=jeniks_password

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://jeniks_user:jeniks_password@db:5432/jeniks_db
      - DEBUG=1
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/
    depends_on:
      - backend

volumes:
  postgres_data:
